name: Publish LikeC4 diagrams

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SITE_BASE_PATH: /${{ github.event.repository.name }}/

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export LikeC4 diagrams
        uses: likec4/actions@v1
        with:
          export: png
          path: software/likec4
          output: site/images
          use-dot-bin: 'true'

      - name: Build LikeC4 website
        uses: likec4/actions@v1
        with:
          action: build
          path: software/likec4
          output: site
          base: ${{ env.SITE_BASE_PATH }}

      - name: Diagnostic — show site contents
        run: |
          echo "=== site contents ==="
          ls -la site || true
          du -sh site || true
          find site -maxdepth 3 -type f -print | sed -n '1,200p'

      - name: Ensure index exists for Pages
        run: |
          if [ ! -f site/index.html ] && [ -f site/README.md ]; then
            echo "No index.html found; moving README.md -> index.md"
            mv site/README.md site/index.md
          fi
          if [ ! -f site/index.html ] && [ ! -f site/index.md ]; then
            echo "Creating minimal index.html"
            mkdir -p site
            echo '<!doctype html><meta charset="utf-8"><title>Site</title><h1>Deployed site</h1><p>This is a minimal index created by CI to ensure GitHub Pages can deploy.</p>' > site/index.html
          fi

      - name: Fix permissions on site
        run: |
          mkdir -p site
          sudo chown -R $(id -u):$(id -g) site || true
          chmod -R u+rwX site || true

      - name: Prepare static site assets
        run: |
          touch site/.nojekyll

      - name: Copy documentation
        run: |
          cp software/likec4/README.md site/README.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
